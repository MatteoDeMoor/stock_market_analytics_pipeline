name: Keep Streamlit App Awake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit app
        run: |
          curl --location --max-time 60 \
          "https://stockmarketanalyticspipeline.streamlit.app/_stcore/health" \
          || echo "Ping failed, app may be waking up."
