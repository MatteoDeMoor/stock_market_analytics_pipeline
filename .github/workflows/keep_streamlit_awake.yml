name: Keep Streamlit App Awake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit app
        run: |
          curl -sS -o /dev/null -w "HTTP status: %{http_code}\n" \
          --max-time 60 \
          "https://stockmarketanalyticspipeline.streamlit.app/" \
          || echo "Ping failed, app may be sleeping or waking up."